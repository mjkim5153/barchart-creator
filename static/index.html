<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>운항스케줄 바차트</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<!-- 상단 설정 영역 -->
<header id="settings-bar">
  <div class="settings-group">
    <label for="query-date-input">조회일</label>
    <span id="query-date-field"><input type="date" id="query-date-input" /></span>
    <button id="query-date-free-btn" class="link-btn hidden" type="button">직접 입력</button>
  </div>
  <div class="settings-group">
    <label for="airline-select">항공사</label>
    <select id="airline-select">
      <option value="">-- 선택 --</option>
    </select>
  </div>
  <div class="settings-group">
    <label>TOF</label>
    <div id="tof-container" class="tof-multiselect"></div>
  </div>
  <div class="settings-group">
    <label for="aircraft-filter">기재</label>
    <select id="aircraft-filter">
      <option value="all">전체</option>
      <option value="icn">인천기재</option>
      <option value="domestic">국내기재</option>
    </select>
  </div>
  <div class="settings-group btn-group">
    <button id="search-btn" class="btn btn-primary">검색 (크롤링)</button>
    <label class="btn btn-secondary" for="upload-input">엑셀 업로드</label>
    <input type="file" id="upload-input" accept=".xlsx,.xls" style="display:none" />
    <a href="/api/template" class="btn btn-secondary" style="text-decoration:none">양식 다운로드</a>
    <button id="download-btn" class="btn btn-secondary">엑셀 다운로드</button>
    <button id="export-jpeg-btn" class="btn btn-secondary">이미지 저장</button>
    <button id="panel-toggle-btn" class="btn btn-secondary">통계 패널 숨기기</button>
  </div>
  <div id="loading-spinner" class="spinner hidden"></div>
  <div id="status-msg" class="status-msg"></div>
</header>

<!-- 메인 콘텐츠 -->
<div id="main-content">

  <!-- 좌측 요약 패널 -->
  <aside id="summary-panel">
    <div class="panel-section">
      <h3>정시율 분석</h3>
      <div class="op-filter-controls">
        <select id="ontime-date-filter">
          <option value="all">전체</option>
        </select>
        <select id="ontime-aircraft-filter">
          <option value="all">전체</option>
          <option value="icn">인천기재</option>
          <option value="domestic">국내기재</option>
        </select>
        <select id="ontime-tof-filter">
          <option value="all">전체</option>
        </select>
        <select id="ontime-nat-filter">
          <option value="all">전체</option>
        </select>
        <select id="ontime-delay-threshold">
          <option value="0">0분 초과</option>
          <option value="5">5분 초과</option>
          <option value="15" selected>15분 초과</option>
          <option value="30">30분 초과</option>
          <option value="60">60분 초과</option>
        </select>
      </div>
      <div id="ontime-table"></div>
    </div>
  </aside>

  <!-- 우측 바차트 영역 -->
  <main id="barchart-area">
    <div id="ro-ri-warning" class="ro-ri-warning hidden">
      <div class="ro-ri-warning-title"></div>
      <ul class="ro-ri-warning-list"></ul>
    </div>
    <div id="barchart-container">
      <svg id="barchart-svg"></svg>
    </div>
    <div id="tooltip" class="tooltip hidden"></div>
  </main>

</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/filters.js"></script>
<script src="/static/js/barchart.js"></script>
<script src="/static/js/summary.js"></script>
<script src="/static/js/main.js"></script>
</body>
</html>
